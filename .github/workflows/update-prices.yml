name: Sincronización Diaria MITECO

on:
  schedule:
    # Se ejecuta todos los días a las 02:00 AM UTC
    - cron: '0 2 * * *'
  # Permite ejecutarlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔄 Ejecutar Script MITECO (Descargar precios)
        run: node scripts/sync-miteco.mjs

      - name: 📤 Hacer Commit y Push con los nuevos datos
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/locations.json
          git commit -m "🤖 Actualización automática diaria de precios MITECO" || echo "No hay cambios para actualizar"
          git push
